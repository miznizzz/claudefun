<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Feral Horoscope</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07050f;
    --surface: rgba(20,12,38,0.75);
    --border: #2a1f40;
    --border-active: #9b7fd4;
    --text: #e0d0ff;
    --text-muted: #6d5090;
    --text-dim: #3d2860;
    --text-body: #ddd0f5;
    --accent: #c0a0f0;
    --accent-bg: rgba(60,25,90,0.5);
    --font-serif: Georgia, 'Times New Roman', serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-serif);
    min-height: 100vh;
    overflow-x: hidden;
  }

  canvas#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 3rem 1.5rem 4rem;
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: rgba(7,5,15,0.6);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .header { text-align: center; margin-bottom: 2.25rem; }
  .header-dots { font-size: 10px; letter-spacing: 7px; color: var(--text-dim); margin-bottom: 10px; }
  .header-title { font-size: 32px; font-weight: 400; letter-spacing: 3px; color: var(--text); line-height: 1.1; }
  .header-sub { font-size: 10px; letter-spacing: 6px; color: var(--text-muted); text-transform: uppercase; margin-top: 8px; }
  .header-rule { width: 60px; height: 1px; background: var(--border); margin: 14px auto 0; }

  .field { margin-bottom: 1.4rem; }
  .label { display: block; font-size: 10px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    padding: 5px 13px; font-size: 11px; font-family: var(--font-serif);
    letter-spacing: 1px; border: 1px solid var(--border); border-radius: 20px;
    background: transparent; color: var(--text-muted); cursor: pointer;
    text-transform: lowercase; transition: all 0.15s;
  }
  .pill:hover { border-color: #5a3f80; color: #a080d0; }
  .pill.active { border-color: var(--border-active); background: #2a1540; color: var(--accent); }

  textarea {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px; color: var(--text-body);
    font-family: var(--font-serif); font-size: 13.5px;
    line-height: 1.7; outline: none; transition: border-color 0.15s; resize: none;
  }
  textarea:focus { border-color: #5a3f80; }
  textarea::placeholder { color: var(--text-dim); }

  .btn {
    width: 100%; padding: 13px 0; background: transparent;
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text-dim); font-family: var(--font-serif);
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    cursor: not-allowed; transition: all 0.2s; margin-top: 0.25rem;
  }
  .btn.ready { border-color: #7040b0; background: var(--accent-bg); color: var(--accent); cursor: pointer; }
  .btn.ready:hover { background: rgba(80,30,110,0.6); }

  #loading { display: none; text-align: center; padding: 4rem 0; }
  .loading-glyph { font-size: 48px; color: #9060c0; opacity: 0.6; display: block; margin-bottom: 1.5rem; animation: breathe 2s ease-in-out infinite; }
  .loading-msg { font-size: 10px; letter-spacing: 5px; color: var(--text-muted); text-transform: uppercase; }
  @keyframes breathe { 0%,100%{opacity:0.25;transform:scale(0.97)} 50%{opacity:0.75;transform:scale(1.03)} }

  #result { display: none; }
  .result-header { text-align: center; margin-bottom: 1.75rem; }
  .result-glyph { font-size: 52px; color: #b090e0; opacity: 0.7; display: block; line-height: 1; margin-bottom: 8px; }
  .result-meta { font-size: 10px; letter-spacing: 5px; color: var(--text-muted); text-transform: uppercase; }
  .result-body { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 1.75rem 0.25rem; margin-bottom: 1.75rem; }
  .result-body p { font-size: 15px; line-height: 2; color: var(--text-body); white-space: pre-wrap; }
  .reset-btn {
    width: 100%; padding: 10px 0; background: transparent;
    border: 1px solid var(--border); border-radius: 10px; color: var(--text-dim);
    font-family: var(--font-serif); font-size: 10px; letter-spacing: 4px;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #3d2860; color: var(--text-muted); }

  .error-msg { font-size: 12px; color: #c07070; text-align: center; margin-bottom: 12px; }
  .footer { margin-top: 2rem; font-size: 10px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; text-align: center; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <div class="card">
    <div class="header">
      <div class="header-dots">✦ &nbsp; ✦ &nbsp; ✦</div>
      <div class="header-title">Feral Horoscope</div>
      <div class="header-sub">oracle</div>
      <div class="header-rule"></div>
    </div>

    <div id="form">
      <div class="field">
        <span class="label">sign</span>
        <div class="pills" id="signs"></div>
      </div>
      <div class="field">
        <span class="label">mood</span>
        <div class="pills" id="moods"></div>
      </div>
      <div class="field">
        <span class="label">one thing that happened today</span>
        <textarea id="event" rows="3" maxlength="500" placeholder="be specific. the oracle needs details."></textarea>
      </div>
      <div class="error-msg" id="error" style="display:none"></div>
      <button class="btn" id="cta" disabled>✦ &nbsp; consult the oracle &nbsp; ✦</button>
    </div>

    <div id="loading">
      <span class="loading-glyph">◯</span>
      <div class="loading-msg" id="load-msg">reading the bones</div>
    </div>

    <div id="result">
      <div class="result-header">
        <span class="result-glyph" id="res-glyph"></span>
        <div class="result-meta" id="res-meta"></div>
      </div>
      <div class="result-body"><p id="res-text"></p></div>
      <button class="reset-btn" onclick="resetForm()">↩ &nbsp; read again</button>
    </div>
  </div>
  <div class="footer">☽ &nbsp; feral horoscope &nbsp; ☾</div>
</div>

<script>
const SIGNS = ["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];
const MOODS = ["chaotic","tender","vindictive","numb","feral","soft","suspicious","electric","grieving","restless","sharp","dreamy"];
const GLYPHS = {Aries:"♈",Taurus:"♉",Gemini:"♊",Cancer:"♋",Leo:"♌",Virgo:"♍",Libra:"♎",Scorpio:"♏",Sagittarius:"♐",Capricorn:"♑",Aquarius:"♒",Pisces:"♓"};
const LOAD_MSGS = ["reading the bones","arguing with saturn","the void is typing","almost through"];

let selectedSign = "", selectedMood = "";

function buildPills(id, items, onSelect) {
  const el = document.getElementById(id);
  items.forEach(item => {
    const b = document.createElement("button");
    b.className = "pill";
    b.textContent = item;
    b.onclick = () => {
      onSelect(item);
      el.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      b.classList.add("active");
      checkReady();
    };
    el.appendChild(b);
  });
}
buildPills("signs", SIGNS, v => selectedSign = v);
buildPills("moods", MOODS, v => selectedMood = v);
document.getElementById("event").addEventListener("input", checkReady);

function checkReady() {
  const ready = selectedSign && selectedMood && document.getElementById("event").value.trim();
  const btn = document.getElementById("cta");
  btn.disabled = !ready;
  btn.classList.toggle("ready", !!ready);
}

document.getElementById("cta").addEventListener("click", generate);

let loadInterval;
async function generate() {
  const event = document.getElementById("event").value.trim();
  if (!selectedSign || !selectedMood || !event) return;

  document.getElementById("form").style.display = "none";
  document.getElementById("loading").style.display = "block";
  document.getElementById("error").style.display = "none";

  let msgIdx = 0;
  document.getElementById("load-msg").textContent = LOAD_MSGS[0];
  loadInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % LOAD_MSGS.length;
    document.getElementById("load-msg").textContent = LOAD_MSGS[msgIdx];
  }, 1600);

  try {
    const res = await fetch("/api/horoscope", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sign: selectedSign, mood: selectedMood, event })
    });

    clearInterval(loadInterval);
    if (!res.ok) throw new Error("Something went wrong. Try again.");
    const data = await res.json();

    document.getElementById("res-glyph").textContent = GLYPHS[selectedSign];
    document.getElementById("res-meta").textContent = selectedSign + " · " + selectedMood;
    document.getElementById("res-text").textContent = data.horoscope;
    document.getElementById("loading").style.display = "none";
    document.getElementById("result").style.display = "block";

  } catch(e) {
    clearInterval(loadInterval);
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "block";
    document.getElementById("error").textContent = e.message || "Oracle is down. Try again.";
    document.getElementById("form").style.display = "block";
  }
}

function resetForm() {
  selectedSign = ""; selectedMood = "";
  document.getElementById("event").value = "";
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  checkReady();
  document.getElementById("result").style.display = "none";
  document.getElementById("form").style.display = "block";
}

// Star field
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [], W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initStars() {
  stars = Array.from({length: 220}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.3 + 0.2,
    o: Math.random() * 0.45 + 0.1,
    speed: Math.random() * 0.015 + 0.005,
    phase: Math.random() * Math.PI * 2
  }));
}

function drawStars(t) {
  ctx.clearRect(0, 0, W, H);
  [[0.2,0.25,0.38,"rgba(45,15,90,0.35)"],[0.78,0.68,0.42,"rgba(10,26,64,0.4)"],[0.6,0.12,0.28,"rgba(26,8,53,0.3)"]].forEach(([bx,by,br,bc]) => {
    const g = ctx.createRadialGradient(bx*W,by*H,0,bx*W,by*H,br*Math.max(W,H));
    g.addColorStop(0,bc); g.addColorStop(1,"transparent");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });
  stars.forEach(s => {
    const tw = s.o + Math.sin(t*0.001*s.speed*60+s.phase)*0.2;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="rgba(220,208,255,"+Math.max(0,tw)+")"; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener("resize", () => { resize(); initStars(); });
resize(); initStars();
requestAnimationFrame(drawStars);
</script>
</body>
</html>
