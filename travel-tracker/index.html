function norm(list) {
  return list.map(function(c) {
    return Object.assign({}, c, {
      cities: (c.cities || []).map(function(ci) {
        return { name:ci.name, visited:ci.v===1, planned:ci.p===1 };
      })
    });
  });
}

function WorldMap(props) {
  var svgRef = useRef(null);
  var topoLoaded = useRef(false);
  var [geo, setGeo] = useState(null);

  useEffect(function() {
    if (window.topojson) { load(); return; }
    var s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js";
    s.onload = load;
    document.head.appendChild(s);
  }, []);

  function load() {
    if (topoLoaded.current) return;
    topoLoaded.current = true;
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(function(r) { return r.json(); })
      .then(function(t) { setGeo(window.topojson.feature(t, t.objects.countries)); })
      .catch(function() {});
  }

  useEffect(function() {
    if (!geo || !svgRef.current) return;
    var el = svgRef.current;
    var W = el.clientWidth || 340, H = Math.round(W * 0.54);
    el.setAttribute("viewBox", "0 0 " + W + " " + H);
    var proj = d3.geoNaturalEarth1().scale(W / 6.2).translate([W / 2, H / 2]);
    var path = d3.geoPath().projection(proj);
    var flat = Object.values(props.all).reduce(function(a, arr) { return a.concat(arr); }, []);
    var colorMap = { done:C.done, partial:C.partial, planned:C.planned, toGo:C.dim };

    d3.select(el).selectAll("*").remove();
    d3.select(el).append("rect").attr("width", W).attr("height", H).attr("fill", "#0a1e1b");
    d3.select(el).selectAll("path").data(geo.features).join("path")
      .attr("d", path)
      .attr("fill", function(d) {
        var id = NUM_TO_ID[+d.id];
        var c = id && flat.find(function(x) { return x.id === id; });
        return c ? colorMap[c.status] : C.dim + "40";
      })
      .attr("stroke", "#0d2420").attr("stroke-width", 0.4)
      .attr("opacity", function(d) {
        var id = NUM_TO_ID[+d.id];
        return id && flat.find(function(x) { return x.id === id; }) ? 1 : 0.3;
      })
      .style("cursor", function(d) {
        var id = NUM_TO_ID[+d.id];
        return id && flat.find(function(x) { return x.id === id; }) ? "pointer" : "default";
      })
      .on("click", function(ev, d) {
        var id = NUM_TO_ID[+d.id]; if (!id) return;
        var c = flat.find(function(x) { return x.id === id; });
        if (c) props.onSelect(c);
      });
  }, [geo, props.all]);

  if (!geo) {
    return (
      <div style={{height:160,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:12}}>
        Loading map...
      </div>
    );
  }
  return <svg ref={svgRef} style={{width:"100%",display:"block",borderRadius:8}} />;
}

function TravelTracker() {
  var [all, setAll] = useState(INITIAL);
  var [continent, setContinent] = useState("europe");
  var [view, setView] = useState("map");
  var [selected, setSelected] = useState(null);
  var [collapsed, setCollapsed] = useState({});
  var [doneBookings, setDoneBookings] = useState({});
  var [loaded, setLoaded] = useState(false);

  useEffect(function() {
    var link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;600&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
    window.storage.get("grand-tour-v6").then(function(r) {
      if (r) {
        try {
          var d = JSON.parse(r.value);
          if (d.all) setAll(d.all);
          if (d.bookings) setDoneBookings(d.bookings);
        } catch(e) {}
      }
      setLoaded(true);
    }).catch(function() { setLoaded(true); });
  }, []);

  function save(a, b) {
    window.storage.set("grand-tour-v6", JSON.stringify({all:a, bookings:b})).catch(function(){});
  }

  function findCont(id) {
    return Object.keys(all).find(function(k) { return all[k].some(function(c) { return c.id === id; }); });
  }

  function toggleCity(cid, name) {
    var cont = findCont(cid); if (!cont) return;
    var na = Object.assign({}, all);
    na[cont] = all[cont].map(function(c) {
      if (c.id !== cid) return c;
      return Object.assign({}, c, {cities: c.cities.map(function(ci) {
        return ci.name === name ? Object.assign({}, ci, {visited: !ci.visited}) : ci;
      })});
    });
    setAll(na); save(na, doneBookings);
    setSelected(na[cont].find(function(c) { return c.id === cid; }) || null);
  }

  function cycleStatus(cid) {
    var cyc = ["toGo","planned","partial","done"];
    var cont = findCont(cid); if (!cont) return;
    var na = Object.assign({}, all);
    na[cont] = all[cont].map(function(c) {
      if (c.id !== cid) return c;
      return Object.assign({}, c, {status: cyc[(cyc.indexOf(c.status)+1)%cyc.length]});
    });
    setAll(na); save(na, doneBookings);
    setSelected(na[cont].find(function(c) { return c.id === cid; }) || null);
  }

  function toggleBooking(key) {
    var nb = Object.assign({}, doneBookings, {}); nb[key] = !nb[key];
    setDoneBookings(nb); save(all, nb);
  }

  function selectCountry(c) {
    setSelected(function(p) { return p && p.id === c.id ? null : c; });
  }

  function switchCont(id) { setContinent(id); setSelected(null); }

  function toggleCollapse(s) {
    setCollapsed(function(p) { return Object.assign({}, p, {[s]: !p[s]}); });
  }

  var flat = Object.values(all).reduce(function(a, arr) { return a.concat(arr); }, []);
  var gStats = {done:0, partial:0, planned:0, toGo:0, total:0};
  flat.forEach(function(c) { gStats[c.status]++; gStats.total++; });
  var visited = gStats.done + gStats.partial;
  var pct = Math.round((visited / gStats.total) * 100);

  var cList = all[continent] || [];
  var grouped = STATUS_ORDER.reduce(function(acc, s) {
    var items = cList.filter(function(c) { return c.status === s; })
      .sort(function(a, b) { return a.name.localeCompare(b.name); });
    if (items.length) acc.push({status:s, items:items});
    return acc;
  }, []);

  if (!loaded) {
    return (
      <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{color:C.saffron,fontFamily:"Space Grotesk,sans-serif",fontSize:14}}>Loading...</span>
      </div>
    );
  }

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Space Grotesk',sans-serif",color:C.text,maxWidth:700,margin:"0 auto",paddingBottom:72}}>

      <div style={{padding:"22px 20px 16px",borderBottom:"1px solid " + C.border}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:32,fontWeight:800,color:C.saffron,letterSpacing:"-1px",lineHeight:1}}>
          THE GRAND TOUR
        </div>
        <div style={{fontSize:12,color:C.muted,marginTop:5}}>
          {visited} visited &middot; {gStats.planned} planned &middot; {gStats.toGo} on the list
        </div>
        <div style={{marginTop:10,height:2,background:C.border,borderRadius:1,overflow:"hidden"}}>
          <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+C.partial+","+C.saffron+")",transition:"width 0.6s"}} />
        </div>
        <div style={{fontSize:10,color:C.dim,marginTop:3}}>{pct}% covered worldwide</div>
      </div>

      {view === "map" && (
        <div style={{padding:"14px 16px 0"}}>
          <WorldMap all={all} onSelect={selectCountry} />
          <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:8,flexWrap:"wrap"}}>
            {Object.entries(STATUS_CFG).map(function(e) {
              return (
                <div key={e[0]} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:10,height:5,background:e[1].color,borderRadius:1}} />
                  <span style={{fontSize:10,color:C.muted}}>{e[1].label}</span>
                </div>
              );
            })}
          </div>
          <div style={{textAlign:"center",fontSize:10,color:C.dim,marginTop:3,marginBottom:10}}>Tap any country for details</div>
          {selected && (
            <div style={{marginBottom:16,background:C.card,borderRadius:8,border:"1px solid "+C.border,borderLeft:"3px solid "+STATUS_CFG[selected.status].color}}>
              <div style={{padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:selected.cities.length?10:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:24}}>{selected.flag}</span>
                    <div>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14}}>{selected.name}</div>
                      {selected.note && <div style={{fontSize:10,color:C.muted,marginTop:1}}>{selected.note}</div>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0}}>
                    <button onClick={function(){cycleStatus(selected.id);}}
                      style={{background:STATUS_CFG[selected.status].bg,border:"1px solid "+STATUS_CFG[selected.status].color+"40",borderRadius:3,color:STATUS_CFG[selected.status].color,fontSize:10,padding:"3px 8px",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>
                      {STATUS_CFG[selected.status].label}
                    </button>
                    <button onClick={function(){setSelected(null);}} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:18,padding:0,lineHeight:1}}>×</button>
                  </div>
                </div>
                {selected.cities.length > 0 && (
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {selected.cities.map(function(ci) {
                      return (
                        <button key={ci.name} onClick={function(){toggleCity(selected.id,ci.name);}}
                          style={{padding:"3px 9px",borderRadius:20,fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:ci.visited?500:400,
                            border:ci.visited?"1px solid "+C.done+"50":ci.planned?"1px solid "+C.planned+"40":"1px solid "+C.border,
                            background:ci.visited?"rgba(82,196,122,0.12)":ci.planned?"rgba(184,128,240,0.1)":"transparent",
                            color:ci.visited?C.done:ci.planned?C.planned:C.muted}}>
                          {ci.visited?"✓ ":""}{ci.name}{ci.planned&&!ci.visited?" ✈":""}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {view === "list" && (
        <div>
          <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid "+C.border,scrollbarWidth:"none"}}>
            {CONTINENTS.map(function(ct) {
              var ctL = all[ct.id] || [];
              var ctV = ctL.filter(function(c){return c.status==="done"||c.status==="partial";}).length;
              var isA = ct.id === continent;
              return (
                <button key={ct.id} onClick={function(){switchCont(ct.id);}}
                  style={{padding:"8px 12px 6px",whiteSpace:"nowrap",background:"transparent",border:"none",borderBottom:isA?"2px solid "+C.saffron:"2px solid transparent",cursor:"pointer",fontFamily:"inherit"}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:800,letterSpacing:"0.8px",color:isA?C.saffron:C.muted}}>{ct.label.toUpperCase()}</div>
                  <div style={{marginTop:3,height:2,background:C.border,borderRadius:1,overflow:"hidden",minWidth:28}}>
                    <div style={{height:"100%",width:ctL.length?Math.round((ctV/ctL.length)*100)+"%":"0%",background:isA?C.saffron:C.dim}} />
                  </div>
                  <div style={{fontSize:9,color:C.dim,marginTop:1,textAlign:"center"}}>{ctV}/{ctL.length}</div>
                </button>
              );
            })}
          </div>

          <div style={{padding:"12px 16px 0"}}>
            {grouped.map(function(group) {
              var s = group.status; var items = group.items;
              var cfg = STATUS_CFG[s];
              var isCollapsed = !!collapsed[s];
              return (
                <div key={s} style={{marginBottom:20}}>
                  <button onClick={function(){toggleCollapse(s);}}
                    style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"0 0 8px",borderBottom:"1px solid "+C.border,marginBottom:isCollapsed?0:12,fontFamily:"inherit"}}>
                    <div style={{width:3,height:14,background:cfg.color,borderRadius:1,flexShrink:0}} />
                    <span style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:800,color:cfg.color,letterSpacing:"1.5px"}}>{cfg.label.toUpperCase()}</span>
                    <span style={{fontSize:10,color:C.dim,flex:1,textAlign:"left"}}>— {items.length}</span>
                    <span style={{fontSize:11,color:C.dim,transition:"transform 0.2s",transform:isCollapsed?"rotate(-90deg)":"rotate(0deg)"}}>▾</span>
                  </button>

                  {!isCollapsed && (function() {
                    var rows = [];
                    for (var ri = 0; ri < Math.ceil(items.length / 4); ri++) { rows.push(ri); }
                    return rows.map(function(ri) {
                      var row = items.slice(ri*4, ri*4+4);
                      var rowHasSel = selected && row.some(function(c){return c.id===selected.id;});
                      return (
                        <div key={ri} style={{marginBottom:rowHasSel?0:8}}>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7}}>
                            {row.map(function(country) {
                              var isSel = selected && selected.id === country.id;
                              var vc = country.cities.filter(function(ci){return ci.visited;}).length;
                              var tc = country.cities.length;
                              return (
                                <button key={country.id} onClick={function(){selectCountry(country);}}
                                  style={{padding:"11px 4px 9px",borderRadius:6,textAlign:"center",cursor:"pointer",fontFamily:"inherit",
                                    border:"1px solid "+(isSel?cfg.color+"90":cfg.color+"18"),
                                    borderBottom:isSel?"2px solid "+cfg.color:"1px solid "+cfg.color+"18",
                                    background:isSel?cfg.color+"18":cfg.bg,outline:"none",transition:"all 0.12s"}}>
                                  <div style={{fontSize:26,lineHeight:1}}>{country.flag}</div>
                                  <div style={{fontSize:9,color:isSel?cfg.color:C.muted,marginTop:4,lineHeight:1.3,fontWeight:isSel?600:400,wordBreak:"break-word"}}>{country.name}</div>
                                  {tc>0 && <div style={{fontSize:8,color:C.dim,marginTop:2}}>{vc}/{tc}</div>}
                                </button>
                              );
                            })}
                            {row.length < 4 && (function(){
                              var e = []; for (var i=0;i<4-row.length;i++) e.push(i);
                              return e.map(function(i){return <div key={i}/>;});
                            })()}
                          </div>
                          {rowHasSel && selected && (
                            <div style={{background:C.card,borderRadius:"0 0 8px 8px",border:"1px solid "+C.border,borderTopWidth:2,borderTopColor:STATUS_CFG[selected.status].color,overflow:"hidden",marginBottom:8}}>
                              <div style={{padding:"11px 13px"}}>
                                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:selected.cities.length?9:0}}>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    <span style={{fontSize:20}}>{selected.flag}</span>
                                    <div>
                                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:C.text}}>{selected.name}</div>
                                      {selected.note && <div style={{fontSize:10,color:C.muted,marginTop:1}}>{selected.note}</div>}
                                      {selected.cities.length>0 && <div style={{fontSize:9,color:C.dim,marginTop:1}}>{selected.cities.filter(function(c){return c.visited;}).length}/{selected.cities.length} locations</div>}
                                    </div>
                                  </div>
                                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                                    <button onClick={function(){cycleStatus(selected.id);}}
                                      style={{background:STATUS_CFG[selected.status].bg,border:"1px solid "+STATUS_CFG[selected.status].color+"40",borderRadius:3,color:STATUS_CFG[selected.status].color,fontSize:10,padding:"3px 7px",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>
                                      {STATUS_CFG[selected.status].label}
                                    </button>
                                    <button onClick={function(){setSelected(null);}} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:17,padding:0,lineHeight:1}}>×</button>
                                  </div>
                                </div>
                                {selected.cities.length>0 && (
                                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                                    {selected.cities.map(function(ci){
                                      return (
                                        <button key={ci.name} onClick={function(){toggleCity(selected.id,ci.name);}}
                                          style={{padding:"3px 8px",borderRadius:20,fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:ci.visited?500:400,
                                            border:ci.visited?"1px solid "+C.done+"50":ci.planned?"1px solid "+C.planned+"40":"1px solid "+C.border,
                                            background:ci.visited?"rgba(82,196,122,0.12)":ci.planned?"rgba(184,128,240,0.1)":"transparent",
                                            color:ci.visited?C.done:ci.planned?C.planned:C.muted}}>
                                          {ci.visited?"✓ ":""}{ci.name}{ci.planned&&!ci.visited?" ✈":""}
                                        </button>
                                      );
                                    })}
                                  </div>
                                )}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    });
                  })()}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view === "trips" && (
        <div style={{padding:"16px"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:800,color:C.muted,letterSpacing:"1.5px",marginBottom:14}}>PIPELINE</div>
          {TRIPS.map(function(trip) {
            var ts = TRIP_CFG[trip.tripStatus] || TRIP_CFG.confirmed;
            return (
              <div key={trip.id} style={{background:C.card,borderRadius:8,border:"1px solid "+C.border,borderLeft:"3px solid "+ts.color,marginBottom:10}}>
                <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:C.text}}>{trip.flags} {trip.title}</div>
                  <div style={{background:ts.bg,border:"1px solid "+ts.color+"40",borderRadius:3,color:ts.color,fontSize:9,padding:"3px 7px",fontWeight:700,letterSpacing:"0.8px",fontFamily:"'Syne',sans-serif",whiteSpace:"nowrap",flexShrink:0}}>{ts.label}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {view === "stats" && (
        <div style={{padding:"16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
            {[[visited,C.saffron,"visited"],[gStats.planned,C.planned,"planned"],[gStats.toGo,C.toGo,"on list"]].map(function(row,i) {
              return (
                <div key={i} style={{background:C.card,borderRadius:8,border:"1px solid "+C.border,padding:"14px 12px",textAlign:"center"}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:36,fontWeight:800,color:row[1],lineHeight:1}}>{row[0]}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:4}}>{row[2]}</div>
                </div>
              );
            })}
          </div>

          <div style={{background:C.card,borderRadius:8,border:"1px solid "+C.border,padding:"12px 14px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:800,color:C.muted,letterSpacing:"1px"}}>GLOBAL COVERAGE</span>
              <span style={{fontSize:10,color:C.saffron,fontWeight:600}}>{pct}%</span>
            </div>
            <div style={{height:10,borderRadius:5,overflow:"hidden",background:C.border,display:"flex"}}>
              {STATUS_ORDER.map(function(s) {
                var w = (gStats[s] / gStats.total) * 100;
                return w ? <div key={s} style={{width:w+"%",background:STATUS_CFG[s].color,height:"100%"}} /> : null;
              })}
            </div>
          </div>

          <div style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:800,color:C.muted,letterSpacing:"1.5px",marginBottom:10}}>BY CONTINENT</div>
          {CONTINENTS.map(function(ct) {
            var ctList = all[ct.id] || [];
            var total = ctList.length; if (!total) return null;
            var counts = {done:0,partial:0,planned:0,toGo:0};
            ctList.forEach(function(c){counts[c.status]++;});
            var vis = counts.done + counts.partial;
            return (
              <div key={ct.id} style={{background:C.card,borderRadius:8,border:"1px solid "+C.border,padding:"11px 13px",marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:7}}>
                  <span style={{fontFamily:"'Syne',sans-serif",fontSize:12,fontWeight:700,color:C.text}}>{ct.label}</span>
                  <span style={{fontSize:10,color:C.muted}}>{vis}/{total}</span>
                </div>
                <div style={{height:12,borderRadius:6,overflow:"hidden",display:"flex",background:C.border}}>
                  {STATUS_ORDER.map(function(s) {
                    var w = (counts[s]/total)*100;
                    return w ? <div key={s} style={{width:w+"%",background:STATUS_CFG[s].color,height:"100%"}} /> : null;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {view === "stamps" && (
        <div style={{padding:"16px"}}>
          <div style={{background:"#f0e8d0",borderRadius:12,padding:"18px 14px",border:"1px solid "+C.border}}>
            <div style={{textAlign:"center",marginBottom:18}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:11,fontWeight:800,color:"#8a7a68",letterSpacing:"2px"}}>TRAVEL STAMPS</div>
              <div style={{fontSize:10,color:"#a89880",marginTop:2}}>{visited} countries collected</div>
            </div>
            {CONTINENTS.map(function(ct) {
              var ctV = (all[ct.id]||[]).filter(function(c){return c.status==="done"||c.status==="partial";});
              if (!ctV.length) return null;
              var col = STAMP_COLORS[ct.id];
              return (
                <div key={ct.id} style={{marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{flex:1,height:1,background:"#d4c8b0"}} />
                    <span style={{fontSize:9,fontWeight:700,color:"#a89880",letterSpacing:"1.5px",whiteSpace:"nowrap"}}>{ct.label.toUpperCase()}</span>
                    <div style={{flex:1,height:1,background:"#d4c8b0"}} />
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
                    {ctV.map(function(country) {
                      var rot = ((country.id.charCodeAt(0)+country.id.charCodeAt(1))%7)-3;
                      return (
                        <div key={country.id}
                          onClick={function(){switchCont(ct.id);setSelected(country);setView("list");}}
                          style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 8px 6px",border:"2px dashed "+col,borderRadius:4,transform:"rotate("+rot+"deg)",background:col+"10",minWidth:54,maxWidth:66,cursor:"pointer",position:"relative"}}>
                          <div style={{fontSize:20,lineHeight:1}}>{country.flag}</div>
                          <div style={{fontSize:8,color:col,marginTop:3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",textAlign:"center",lineHeight:1.3,wordBreak:"break-word"}}>{country.name}</div>
                          {country.status==="partial" && (
                            <div style={{position:"absolute",top:2,right:2,width:5,height:5,borderRadius:"50%",background:C.partial,border:"1px solid #f0e8d0"}} />
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            <div style={{textAlign:"center",marginTop:6,fontSize:9,color:"#b8a898"}}>orange dot = partial · tap to jump to country</div>
          </div>
        </div>
      )}

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#091a17",borderTop:"1px solid "+C.border,zIndex:100}}>
        <div style={{display:"flex",maxWidth:700,margin:"0 auto"}}>
          {NAV.map(function(item) {
            var isActive = view === item.id;
            return (
              <button key={item.id} onClick={function(){setView(item.id);setSelected(null);}}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 4px 12px",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",borderTop:isActive?"2px solid "+C.saffron:"2px solid transparent",transition:"all 0.15s"}}>
                <span style={{fontSize:14,lineHeight:1,opacity:isActive?1:0.5}}>{item.icon}</span>
                <span style={{fontFamily:"'Syne',sans-serif",fontSize:9,fontWeight:800,letterSpacing:"0.8px",color:isActive?C.saffron:C.dim}}>{item.label}</span>
              </button>
            );
          })}
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TravelTracker));
</script>
</body>
</html>
