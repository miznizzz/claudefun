const DAYS  = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DSHORT = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const BUDGETS = {
  "under10": { label:"Under £10", dot:"#3DBA5C" },
  "10-20":   { label:"£10–20",    dot:"#F0A500" },
  "20+":     { label:"£20+",      dot:"#E8341A" },
};
const TYPES = {
  food:   { label:"🍴 Food" },
  drinks: { label:"🍹 Drinks" },
  both:   { label:"✨ Both" },
};
const MEALS = {
  breakfast: { label:"🍳 Breakfast" },
  brunch:    { label:"🥂 Brunch" },
  lunch:     { label:"☀️ Lunch" },
  dinner:    { label:"🌙 Dinner" },
  latenight: { label:"🌛 Late Night" },
  allday:    { label:"📅 All Day" },
};
const STORAGE_KEY = "peckham-deals-v2";

function App() {
  const [day,      setDay]      = useState(null);
  const [budget,   setBudget]   = useState(null);
  const [type,     setType]     = useState(null);
  const [meal,     setMeal]     = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [userDeals,setUserDeals]= useState([]);
  const [ready,    setReady]    = useState(false);
  const [saving,   setSaving]   = useState(false);
  const [form, setForm] = useState({ venue:"", deal:"", price:"", detail:"", days:[], budget:"under10", type:"food", mealTime:"allday", time:"" });
  const today = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
  useEffect(() => {
    (async () => {
      try { const saved = localStorage.getItem(STORAGE_KEY); if (saved) setUserDeals(JSON.parse(saved)); } catch {}
      setReady(true);
    })();
  }, []);
  const all = [...DEALS, ...userDeals];
  const filtered = all.filter(d => {
    if (day    && !d.days.includes(day))    return false;
    if (budget && d.budget !== budget)      return false;
    if (type   && d.type   !== type)        return false;
    if (meal   && d.mealTime !== meal)      return false;
    return true;
  });
  async function save() {
    if (!form.venue || !form.deal || !form.days.length) return;
    setSaving(true);
    const nd = { ...form, id: Date.now(), emoji:"📸", chalkboard:true, address:"Peckham" };
    const next = [...userDeals, nd];
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); setUserDeals(next); } catch {}
    setSaving(false);
    setForm({ venue:"", deal:"", price:"", detail:"", days:[], budget:"under10", type:"food", mealTime:"allday", time:"" });
    setShowForm(false);
  }
  async function remove(id) {
    const next = userDeals.filter(d => d.id !== id);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); setUserDeals(next); } catch {}
  }
  function toggleDay(d) { setForm(f => ({ ...f, days: f.days.includes(d) ? f.days.filter(x=>x!==d) : [...f.days,d] })); }
  const activeFilters = [budget,type,meal].filter(Boolean).length;
  return (
    <div style={{ minHeight:"100vh", background:"#0C0B08", color:"#F2EDE0" }}>
      <style>{`

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 120px", gap:10 }}>
                <input className="inp" placeholder="Venue name" value={form.venue} onChange={e=>setForm(f=>({...f,venue:e.target.value}))} />
                <input className="inp" placeholder="The deal (e.g. 2-4-1 cocktails)" value={form.deal} onChange={e=>setForm(f=>({...f,deal:e.target.value}))} />
                <input className="inp" placeholder="Price (£6)" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} />
              </div>
              <input className="inp" placeholder="Detail (optional)" value={form.detail} onChange={e=>setForm(f=>({...f,detail:e.target.value}))} />
              <div>
                <div className="slabel" style={{ marginBottom:7 }}>Days</div>
                <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                  {DAYS.map((d,i) => <button key={d} className={`dpill ${form.days.includes(d)?"on":""}`} onClick={()=>toggleDay(d)}>{DSHORT[i]}</button>)}
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10 }}>
                <div><div className="slabel" style={{marginBottom:5}}>Budget</div>
                  <select className="sel" value={form.budget} onChange={e=>setForm(f=>({...f,budget:e.target.value}))}>
                    <option value="under10">Under £10</option><option value="10-20">£10–20</option><option value="20+">£20+</option>
                  </select></div>
                <div><div className="slabel" style={{marginBottom:5}}>Type</div>
                  <select className="sel" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                    <option value="food">Food</option><option value="drinks">Drinks</option><option value="both">Both</option>
                  </select></div>
                <div><div className="slabel" style={{marginBottom:5}}>Meal time</div>
                  <select className="sel" value={form.mealTime} onChange={e=>setForm(f=>({...f,mealTime:e.target.value}))}>
                    <option value="breakfast">Breakfast</option><option value="brunch">Brunch</option><option value="lunch">Lunch</option>
                    <option value="dinner">Dinner</option><option value="latenight">Late Night</option><option value="allday">All Day</option>
                  </select></div>
                <div><div className="slabel" style={{marginBottom:5}}>Time</div>
                  <input className="inp" placeholder="e.g. 6–8pm" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} /></div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button className="btn-red" onClick={save} disabled={saving}>{saving?"Saving…":"Save deal ✓"}</button>
                <button className="btn-ghost" onClick={()=>setShowForm(false)}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}
      <div className="sticky-bar">
        <div style={{ maxWidth:740, margin:"0 auto", padding:"10px 20px", display:"grid", gap:8 }}>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap", alignItems:"center" }}>
            <span className="slabel" style={{ marginRight:6, whiteSpace:"nowrap" }}>Day</span>
            {DAYS.map((d,i) => (
              <button key={d} className={`dpill ${day===d?"on":""} ${d===today&&day!==d?"today":""}`} onClick={()=>setDay(p=>p===d?null:d)}>
                {DSHORT[i]}{d===today?" ●":""}
              </button>
            ))}
            {day && <button className="dpill" style={{borderColor:"#2A2620",color:"#4A4438"}} onClick={()=>setDay(null)}>✕</button>}
          </div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap", alignItems:"center" }}>
            <span className="slabel" style={{ marginRight:6 }}>Filter</span>
            {Object.entries(BUDGETS).map(([k,v]) => (
              <button key={k} className={`chip ${budget===k?"on":""}`}
                style={budget!==k?{borderColor:v.dot+"40",color:v.dot}:{}}
                onClick={()=>setBudget(p=>p===k?null:k)}>{v.label}</button>
            ))}
            <span style={{color:"var(--border)",padding:"0 3px"}}>·</span>
            {Object.entries(TYPES).map(([k,v]) => (
              <button key={k} className={`chip ${type===k?"on":""}`} onClick={()=>setType(p=>p===k?null:k)}>{v.label}</button>
            ))}
            <span style={{color:"var(--border)",padding:"0 3px"}}>·</span>
            {Object.entries(MEALS).map(([k,v]) => (
              <button key={k} className={`chip ${meal===k?"on":""}`} onClick={()=>setMeal(p=>p===k?null:k)}>{v.label}</button>
            ))}
            {activeFilters>0 && (
              <button className="chip" style={{borderColor:"var(--red)",color:"var(--red)"}}
                onClick={()=>{setBudget(null);setType(null);setMeal(null);}}>
                Clear ({activeFilters})
              </button>
            )}
          </div>
        </div>
      </div>
      <div style={{ maxWidth:740, margin:"0 auto", padding:"16px 20px 60px" }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:14 }}>
          <span style={{ fontFamily:"'Barlow Condensed'", fontSize:28, fontWeight:900, letterSpacing:"-1px", color:"var(--chalk)" }}>
            {filtered.length} {filtered.length===1?"deal":"deals"}
          </span>
          <span style={{ fontFamily:"'Archivo'", fontSize:12, color:"var(--muted)" }}>
            {day ? `on ${day}s` : "across the week"}
          </span>
          {!ready && <span style={{fontSize:11,color:"var(--muted)",marginLeft:"auto"}}>Loading…</span>}
        </div>
        {filtered.length===0 ? (
          <div style={{ textAlign:"center", padding:"80px 0" }}>
            <div style={{ fontSize:48, marginBottom:16 }}>🫗</div>
            <div style={{ fontFamily:"'Barlow Condensed'", fontSize:28, fontWeight:800, textTransform:"uppercase", color:"var(--chalk)", letterSpacing:"-1px" }}>Nothing here</div>
            <div style={{ fontFamily:"'Archivo'", fontSize:13, color:"var(--muted)", marginTop:8 }}>Try different filters — or go spot one yourself.</div>
          </div>
        ) : (
          <div style={{ display:"grid", gap:8 }}>
            {filtered.map((deal, i) => {
              const bCfg = BUDGETS[deal.budget];
              const isToday = deal.days.includes(today);
              const isUser  = !!userDeals.find(d=>d.id===deal.id);
              const priceSize = deal.price && deal.price.length > 5 ? "28px" : "42px";
              return (
                <div key={deal.id} className="card" style={{ animationDelay:`${i*.025}s` }}>
                  <div style={{ position:"absolute", left:0, top:0, bottom:0, width:4, background:bCfg.dot }} />
                  {isUser && <button className="del-btn" onClick={()=>remove(deal.id)}>✕ Remove</button>}
                  <div style={{ padding:"14px 16px 14px 20px", display:"grid", gridTemplateColumns:"1fr auto", gap:12, alignItems:"start" }}>
                    <div>
                      <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:5, flexWrap:"wrap" }}>
                        <span style={{ fontSize:13 }}>{deal.emoji}</span>
                        <span className="venue-name">{deal.venue}</span>
                        <span style={{ fontFamily:"'Barlow Condensed'", fontSize:10, color:"#3A3628" }}>·</span>
                        <span style={{ fontFamily:"'Archivo'", fontSize:11, color:"#4A4438" }}>{deal.address}</span>
                        {deal.chalkboard && (
                          <span className="tag" style={{ background:"#2A2414", color:"var(--gold)", border:"1px solid #4A3A0A", marginLeft:"auto" }}>🖊 Verify</span>
                        )}
                        {isUser && (
                          <span className="tag" style={{ background:"#0E2418", color:"var(--green)", border:"1px solid #1A4228" }}>📸 You</span>
                        )}
                      </div>
                      <div className="deal-title" style={{ color:"var(--chalk)", marginBottom:5 }}>{deal.deal}</div>
                      {deal.detail && <div className="detail-text" style={{ marginBottom:10 }}>{deal.detail}</div>}
                      <div style={{ display:"flex", gap:5, flexWrap:"wrap", alignItems:"center" }}>
                        <span className="tag" style={{ background:bCfg.dot+"18", color:bCfg.dot }}>{bCfg.label}</span>
                        <span className="tag" style={{ background:"#1E1C17", color:"#6A6050" }}>{TYPES[deal.type]?.label}</span>
                        <span style={{ fontFamily:"'Barlow Condensed'", fontSize:11, fontWeight:700, letterSpacing:"1px", textTransform:"uppercase", color:"#4A4438" }}>{MEALS[deal.mealTime]?.label}</span>
                        {deal.time && <span style={{ fontFamily:"'Archivo'", fontSize:11, color:"#3A3628" }}>⏰ {deal.time}</span>}
                      </div>
                    </div>
                    <div style={{ textAlign:"right", display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6, flexShrink:0 }}>
                      <div className="price-hero" style={{ fontSize:priceSize, color: isToday ? "var(--red)" : "var(--chalk)", letterSpacing:"-1px" }}>
                        {deal.price}
                      </div>
                      <div style={{ display:"flex", gap:3, flexWrap:"wrap", justifyContent:"flex-end", maxWidth:120 }}>
                        {deal.days.length===7
                          ? <span className="tag" style={{background:"var(--faint)",color:"#5A5040"}}>Every day</span>
                          : (deal.days.length>=5 && deal.days.includes("Monday") && deal.days.includes("Friday"))
                          ? <span className="tag" style={{background:"var(--faint)",color:"#5A5040"}}>Mon–Fri</span>
                          : deal.days.map(d => (
                            <span key={d} className="tag" style={{
                              background: d===today?"var(--red)":"var(--faint)",
                              color: d===today?"#fff":"#5A5040",
                            }}>{d.slice(0,3)}</span>
                          ))
                        }
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{ marginTop:40, paddingTop:20, borderTop:"1.5px solid var(--border)", textAlign:"center" }}>
          <p style={{ fontFamily:"'Archivo'", fontSize:11, color:"#3A3628", lineHeight:1.7 }}>
            🖊 Chalkboard deals change — verify on Instagram before heading out.<br/>
            Your spotted deals save permanently. ✓
          </p>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
