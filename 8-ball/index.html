<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Oracle</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Space+Grotesk:wght@400;500;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(40,32,28,0.5) 0%, transparent 60%),
        linear-gradient(180deg, #0a0909 0%, #07060a 50%, #060508 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Crimson Pro', Georgia, serif;
      color: #ddd4c4;
      padding: 3rem 1.25rem;
      position: relative;
      overflow-x: hidden;
    }

    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; background: #cdbfa3; border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite;
      animation-delay: var(--delay); opacity: var(--op);
    }
    @keyframes twinkle { 0%,100% { opacity: var(--op); } 50% { opacity: 0.08; } }

    .container { z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 460px; }

    .title-section { text-align: center; margin-bottom: 3rem; animation: fadeDown 1.1s ease forwards; }
    .eyebrow {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.62rem; font-weight: 500;
      letter-spacing: 0.4em; text-transform: uppercase; color: rgba(168,150,122,0.65);
      margin-bottom: 0.7rem;
    }
    .title {
      font-family: 'Playfair Display', Georgia, serif; font-weight: 500; font-style: italic;
      font-size: clamp(2.1rem, 8vw, 3rem); letter-spacing: 0.01em; color: #ede4d3;
      margin-bottom: 0.6rem; line-height: 1;
    }
    .title-rule { width: 40px; height: 1px; margin: 0 auto; background: linear-gradient(90deg, transparent, rgba(168,150,122,0.6), transparent); }

    .ball-wrap { position: relative; margin-bottom: 3rem; cursor: pointer; }
    .glow-pulse {
      position: absolute; inset: -16px; border-radius: 50%;
      background: radial-gradient(circle, rgba(168,150,122,0.04) 0%, transparent 70%);
      animation: glowPulse 4s ease-in-out infinite; pointer-events: none;
    }
    .ball {
      width: min(260px, 66vw); height: min(260px, 66vw); border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #19161c 0%, #0c0a0e 55%, #050407 100%);
      box-shadow:
        0 0 0 1px rgba(168,150,122,0.18), 0 0 50px rgba(0,0,0,0.5),
        inset 0 0 50px rgba(0,0,0,0.7), inset 1px 2px 12px rgba(255,255,255,0.03),
        0 25px 60px rgba(0,0,0,0.6);
      position: relative; transition: box-shadow 0.4s ease;
      animation: float 7s ease-in-out infinite;
    }
    .ball:hover {
      box-shadow:
        0 0 0 1px rgba(190,170,135,0.3), 0 0 60px rgba(0,0,0,0.6),
        inset 0 0 50px rgba(0,0,0,0.7), inset 1px 2px 12px rgba(255,255,255,0.04),
        0 28px 70px rgba(0,0,0,0.65);
    }
    .ball.shaking { animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }

    .ball-ring { position: absolute; inset: -1px; border-radius: 50%; border: 1px solid rgba(168,150,122,0.25); pointer-events: none; }
    .ball-shine {
      position: absolute; top: 14%; left: 20%; width: 30%; height: 24%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .inner-window {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 48%; height: 48%; border-radius: 50%;
      background: radial-gradient(circle at center, #14101a 0%, #0a0810 65%, #060408 100%);
      border: 1px solid rgba(168,150,122,0.14);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }

    .triangle-wrap { display: flex; align-items: center; justify-content: center; position: relative; width: 56px; height: 56px; }
    .triangle {
      width: 0; height: 0; border-left: 19px solid transparent; border-right: 19px solid transparent;
      border-bottom: 33px solid rgba(168,150,122,0.55); position: absolute;
    }
    .triangle-num {
      position: absolute; bottom: 5px; font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 1rem; color: rgba(237,228,211,0.85); font-weight: 600; z-index: 1;
    }

    .ball-glow-yes     { box-shadow: 0 0 0 1px rgba(140,168,140,0.35), 0 0 45px rgba(120,150,120,0.18), inset 0 0 50px rgba(0,0,0,0.7) !important; }
    .ball-glow-no      { box-shadow: 0 0 0 1px rgba(180,130,120,0.35), 0 0 45px rgba(160,110,100,0.18), inset 0 0 50px rgba(0,0,0,0.7) !important; }
    .ball-glow-maybe   { box-shadow: 0 0 0 1px rgba(190,165,110,0.35), 0 0 45px rgba(170,145,95,0.18), inset 0 0 50px rgba(0,0,0,0.7) !important; }
    .ball-glow-unknown { box-shadow: 0 0 0 1px rgba(150,140,165,0.35), 0 0 45px rgba(130,120,150,0.18), inset 0 0 50px rgba(0,0,0,0.7) !important; }

    .loading-dots { display: flex; gap: 5px; align-items: center; justify-content: center; }
    .loading-dots span { width: 4px; height: 4px; border-radius: 50%; background: rgba(168,150,122,0.7); animation: dotPulse 1.3s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.22s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.44s; }

    .answer-card {
      width: 100%; background: rgba(255,255,255,0.015); border: 1px solid rgba(168,150,122,0.16);
      border-radius: 2px; padding: 2rem 1.8rem; margin-bottom: 1.8rem; text-align: center;
      animation: cardRise 0.7s ease forwards; z-index: 1; position: relative; display: none;
    }
    .answer-card::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 24px; height: 1px; background: rgba(168,150,122,0.5);
    }
    .verdict-label {
      display: block; font-family: 'Space Grotesk', sans-serif; font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 1.1rem;
    }
    .verdict-YES  { color: #a9c4a3; }
    .verdict-NO   { color: #cfa093; }
    .verdict-MAYBE   { color: #ccb480; }
    .verdict-UNKNOWN { color: #b3a9c4; }

    .response-text {
      font-family: 'Crimson Pro', Georgia, serif; font-style: italic; font-weight: 300;
      font-size: 1.05rem; color: rgba(225,217,200,0.92); line-height: 1.65; letter-spacing: 0.005em;
    }
    .footnote-inline {
      margin-top: 1.2rem; font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem;
      letter-spacing: 0.04em; color: rgba(150,138,120,0.55);
    }

    .input-section { width: 100%; display: flex; flex-direction: column; gap: 1.1rem; animation: fadeUp 1s ease 0.3s forwards; opacity: 0; }
    textarea {
      width: 100%; background: rgba(255,255,255,0.015); border: none;
      border-bottom: 1px solid rgba(168,150,122,0.25); border-radius: 0;
      padding: 0.7rem 0.1rem; color: #ddd4c4;
      font-family: 'Crimson Pro', Georgia, serif; font-size: 1.05rem; font-style: italic; font-weight: 300;
      letter-spacing: 0.01em; outline: none; resize: none; line-height: 1.5;
      transition: border-color 0.3s;
    }
    textarea::placeholder { color: rgba(150,138,120,0.4); font-style: italic; }
    textarea:focus { border-bottom-color: rgba(190,170,135,0.6); }

    .hint { font-family: 'Space Grotesk', sans-serif; font-size: 0.62rem; letter-spacing: 0.1em; color: rgba(150,138,120,0.4); text-align: center; margin-top: -0.5rem; }

    button {
      background: transparent; border: 1px solid rgba(168,150,122,0.35); color: #cdbfa3;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase; padding: 0.9rem 2rem; border-radius: 1px;
      cursor: pointer; transition: all 0.35s ease; margin-top: 0.3rem;
    }
    button:hover:not(:disabled) { border-color: rgba(205,191,163,0.7); background: rgba(168,150,122,0.06); color: #ede4d3; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .history-section { width: 100%; margin-top: 2.5rem; z-index: 1; }
    .history-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase; color: rgba(150,138,120,0.5);
      margin-bottom: 1rem; text-align: center;
    }
    .history-item { padding: 0.85rem 0; border-bottom: 1px solid rgba(168,150,122,0.1); }
    .history-item:last-child { border-bottom: none; }
    .history-q { font-style: italic; font-weight: 300; font-size: 0.85rem; color: rgba(205,195,170,0.65); margin-bottom: 0.35rem; }
    .history-a { font-size: 0.78rem; color: rgba(150,138,120,0.55); line-height: 1.45; }
    .history-verdict { font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.2em; margin-right: 0.6rem; }

    .particle {
      position: absolute; width: 2px; height: 2px; border-radius: 50%;
      background: rgba(190,170,135,0.7); pointer-events: none;
      animation: particleFly 1s ease-out forwards;
    }

    @keyframes fadeDown  { from { opacity:0; transform: translateY(-14px); } to { opacity:1; transform: translateY(0); } }
    @keyframes fadeUp    { from { opacity:0; transform: translateY(16px);  } to { opacity:1; transform: translateY(0); } }
    @keyframes float     { 0%,100% { transform: translateY(0);   } 50% { transform: translateY(-8px); } }
    @keyframes glowPulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.08); opacity: 1; } }
    @keyframes cardRise  { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    @keyframes particleFly { from { opacity:1; transform: translate(0,0) scale(1); } to { opacity:0; transform: translate(var(--dx),var(--dy)) scale(0); } }
    @keyframes shake {
      10%,90% { transform: translate3d(-2px,-1px,0) rotate(-0.6deg); }
      20%,80% { transform: translate3d(3px,1px,0) rotate(0.6deg); }
      30%,50%,70% { transform: translate3d(-3px,0,0) rotate(-1deg); }
      40%,60% { transform: translate3d(3px,-1px,0) rotate(1deg); }
      100% { transform: translate3d(0,0,0) rotate(0); }
    }
    @keyframes dotPulse { 0%,80%,100% { transform: scale(0.6); opacity:0.35; } 40% { transform: scale(1); opacity:0.9; } }
  </style>
</head>
<body>

<div id="stars"></div>

<div class="container">
  <div class="title-section">
    <div class="eyebrow">A Consultation</div>
    <div class="title">The Oracle</div>
    <div class="title-rule"></div>
  </div>

  <div class="ball-wrap" id="ballWrap" onclick="handleBallClick()">
    <div class="glow-pulse"></div>
    <div class="ball" id="ball">
      <div class="ball-ring"></div>
      <div class="ball-shine"></div>
      <div class="inner-window" id="innerWindow">
        <div class="triangle-wrap">
          <div class="triangle"></div>
          <div class="triangle-num">8</div>
        </div>
      </div>
    </div>
  </div>

  <div class="answer-card" id="answerCard">
    <span class="verdict-label" id="verdictBadge"></span>
    <div class="response-text" id="answerText"></div>
    <div class="footnote-inline" id="footnoteInline"></div>
  </div>

  <div class="input-section">
    <textarea id="questionInput" rows="2" maxlength="300" placeholder="Pose your question to the void..."></textarea>
    <p class="hint">press enter, or tap the orb</p>
    <button id="askBtn" onclick="askOracle()">Consult the Oracle</button>
  </div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">Past Consultations</div>
    <div id="historyList"></div>
  </div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 45; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() > 0.88 ? 2 : 1;
    Object.assign(s.style, {
      top: Math.random() * 100 + '%',
      left: Math.random() * 100 + '%',
      width: size + 'px', height: size + 'px',
      '--d': (3 + Math.random() * 4) + 's',
      '--delay': (Math.random() * 4) + 's',
      '--op': (0.15 + Math.random() * 0.4),
    });
    starsEl.appendChild(s);
  }

  document.getElementById('questionInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askOracle(); }
  });

  function handleBallClick() {
    if (document.getElementById('questionInput').value.trim()) askOracle();
  }

  let history = [];

  async function askOracle() {
    const question = document.getElementById('questionInput').value.trim();
    if (!question) return;

    const ball = document.getElementById('ball');
    const btn  = document.getElementById('askBtn');
    const win  = document.getElementById('innerWindow');
    const card = document.getElementById('answerCard');

    ball.classList.remove('ball-glow-yes', 'ball-glow-no', 'ball-glow-maybe', 'ball-glow-unknown');
    card.style.display = 'none';

    ball.classList.remove('shaking');
    void ball.offsetWidth;
    ball.classList.add('shaking');
    spawnParticles();
    setTimeout(() => ball.classList.remove('shaking'), 700);

    btn.disabled = true;
    btn.textContent = 'The Oracle Speaks';
    win.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;

    try {
      const res = await fetch('/api/oracle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData?.error || 'The oracle is unreachable.');
      }

      const data = await res.json();
      const answer   = data.answer   || 'The oracle is silent.';
      const verdict  = (data.verdict || 'UNKNOWN').toUpperCase();
      const footnote = data.footnote || '';

      win.innerHTML = `<div class="triangle-wrap"><div class="triangle"></div><div class="triangle-num">8</div></div>`;
      ball.classList.add('ball-glow-' + verdict.toLowerCase());

      const badge = document.getElementById('verdictBadge');
      badge.textContent = verdict;
      badge.className = 'verdict-label verdict-' + verdict;
      document.getElementById('answerText').textContent = answer;
      document.getElementById('footnoteInline').textContent = footnote;
      card.style.display = 'block';

      history.unshift({ question, answer, verdict });
      if (history.length > 5) history.pop();
      renderHistory();

    } catch (err) {
      win.innerHTML = `<div class="triangle-wrap"><div class="triangle"></div><div class="triangle-num">8</div></div>`;
      const badge = document.getElementById('verdictBadge');
      badge.textContent = 'SILENT';
      badge.className = 'verdict-label verdict-UNKNOWN';
      document.getElementById('answerText').textContent = err.message;
      document.getElementById('footnoteInline').textContent = 'Try again in a moment.';
      card.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Consult the Oracle';
    }
  }

  function renderHistory() {
    if (!history.length) return;
    document.getElementById('historySection').style.display = 'block';
    document.getElementById('historyList').innerHTML = history.map(h => `
      <div class="history-item">
        <div class="history-q">"${h.question}"</div>
        <div class="history-a">
          <span class="history-verdict verdict-${h.verdict}">${h.verdict}</span>
          ${h.answer}
        </div>
      </div>`).join('');
  }

  function spawnParticles() {
    const wrap = document.getElementById('ballWrap');
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      Object.assign(p.style, {
        top: '50%', left: '50%',
        '--dx': ((Math.random() - 0.5) * 110) + 'px',
        '--dy': ((Math.random() - 0.5) * 110) + 'px',
      });
      wrap.appendChild(p);
    }
  }
</script>
</body>
</html>
